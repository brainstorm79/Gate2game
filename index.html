// ── INVENTORY ─────────────────────────────────────────────────────
function Inventory({ accounts, onDelete, onStatusChange, nav }) {
  const [search, setSearch] = useState('');
  const [statusF, setStatusF] = useState('all');
  const [selected, setSelected] = useState([]);

  const filtered = accounts.filter(a => {
    const ms = !search || a.title.toLowerCase().includes(search.toLowerCase()) || a.accountId.includes(search) || (a.seller || '').toLowerCase().includes(search.toLowerCase());
    const mf = statusF === 'all' || a.status === statusF;
    return ms && mf;
  });

  const toggleAll = () => setSelected(selected.length === filtered.length ? [] : filtered.map(a => a.id));
  const toggle = id => setSelected(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

  const th = { padding: '9px 10px', fontSize: 10, color: C.textMuted, textTransform: 'uppercase', letterSpacing: '0.07em', textAlign: 'left', borderBottom: `1px solid ${C.border}`, whiteSpace: 'nowrap', fontWeight: 600 };
  const td = { padding: '10px', borderBottom: `1px solid rgba(30,30,46,0.6)`, verticalAlign: 'middle', fontSize: 12 };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 18 }}>
        <div>
          <h2 style={{ fontSize: 20, fontWeight: 700, color: '#fff', fontFamily: 'Syne, sans-serif' }}>Inventory</h2>
          <p style={{ color: C.textMuted, fontSize: 11, margin: '3px 0 0' }}>{filtered.length} of {accounts.length} accounts</p>
        </div>
        <Btn onClick={() => nav('add-account')}>＋ Add Account</Btn>
      </div>

      <div style={{ display: 'flex', gap: 10, marginBottom: 14, flexWrap: 'wrap' }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by title, ID, seller..." style={{ padding: '8px 12px', background: C.surface, border: `1px solid ${C.borderAlt}`, borderRadius: 8, color: C.text, fontSize: 12, outline: 'none', width: 250 }} />
        {['all', 'active', 'pending', 'sold', 'draft'].map(s => {
          const c = STATUS_COLORS[s] || '#6b7280';
          const active = statusF === s;
          return <button key={s} onClick={() => setStatusF(s)} style={{ padding: '8px 14px', background: active ? c + '22' : 'transparent', border: `1px solid ${active ? c + '66' : C.borderAlt}`, borderRadius: 8, color: active ? c : '#6b7280', cursor: 'pointer', fontSize: 11, textTransform: 'capitalize', fontWeight: active ? 700 : 400 }}>{s}</button>;
        })}
        {selected.length > 0 && (
          <div style={{ display: 'flex', gap: 8, marginLeft: 'auto', alignItems: 'center' }}>
            <span style={{ fontSize: 11, color: C.purple }}>{selected.length} selected</span>
            <Btn variant="danger" small onClick={() => { selected.forEach(id => onDelete(id)); setSelected([]); }}>Delete</Btn>
          </div>
        )}
      </div>

      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, overflow: 'hidden' }}>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead>
              <tr style={{ background: C.surfaceAlt }}>
                <th style={{ ...th, width: 36 }}><input type="checkbox" checked={selected.length === filtered.length && filtered.length > 0} onChange={toggleAll} style={{ cursor: 'pointer' }} /></th>
                <th style={th}>Account</th>
                <th style={th}>ID</th>
                <th style={th}>Status</th>
                <th style={th}>Platforms</th>
                <th style={th}>Price</th>
                <th style={th}>Margin</th>
                <th style={th}>Views</th>
                <th style={th}>Seller</th>
                <th style={th}>Updated</th>
                <th style={th}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(acc => {
                const mg = acc.price - (acc.buyingPrice || 0);
                const isSel = selected.includes(acc.id);
                return (
                  <tr key={acc.id} style={{ background: isSel ? 'rgba(108,99,255,0.05)' : 'transparent', transition: 'background 0.1s' }}>
                    <td style={td}><input type="checkbox" checked={isSel} onChange={() => toggle(acc.id)} style={{ cursor: 'pointer' }} /></td>
                    <td style={{ ...td, maxWidth: 260 }}>
                      <div style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', color: C.text }}>{acc.title}</div>
                      <div style={{ fontSize: 10, color: C.textFaint, marginTop: 2 }}>Raid: Shadow Legends</div>
                    </td>
                    <td style={td}><code style={{ color: C.textMuted, fontSize: 11 }}>{acc.accountId}</code></td>
                    <td style={td}><Badge status={acc.status} /></td>
                    <td style={td}>
                      <div style={{ display: 'flex', gap: 6 }}>
                        {PLATFORMS.map(p => <PlatformDot key={p.id} status={acc.platforms?.[p.id] || 'inactive'} label={p.id === 'gameboost' ? 'GB' : p.id === 'g2g' ? 'G2G' : p.id === 'zeusx' ? 'ZX' : 'BST'} />)}
                      </div>
                    </td>
                    <td style={td}><span style={{ color: '#fff', fontWeight: 700 }}>€{acc.price}</span></td>
                    <td style={td}><span style={{ color: mg >= 0 ? C.success : C.error, fontWeight: 700 }}>€{mg}</span></td>
                    <td style={td}><span style={{ color: C.textMuted }}>{acc.views}</span></td>
                    <td style={td}><span style={{ color: C.textMuted, fontSize: 11 }}>{acc.seller || '—'}</span></td>
                    <td style={td}><span style={{ color: C.textFaint, fontSize: 10 }}>{acc.lastUpdated}</span></td>
                    <td style={td}>
                      <div style={{ display: 'flex', gap: 5 }}>
                        {acc.status !== 'sold' && <Btn variant="success" small onClick={() => onStatusChange(acc.id, 'sold')}>Sold</Btn>}
                        <Btn variant="danger" small onClick={() => onDelete(acc.id)}>✕</Btn>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {filtered.length === 0 && <div style={{ textAlign: 'center', padding: 50, color: C.textFaint }}><div style={{ fontSize: 30, marginBottom: 10 }}>⬡</div>No accounts found</div>}
        </div>
      </div>
    </div>
  );
}

        ))}
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        {platforms.map(p => {
          const si = statusInfo[p.status];
          return (
            <Card key={p.id} style={{ border: `1px solid ${p.status === 'connected' ? p.color + '33' : p.status === 'warning' ? '#f59e0b33' : C.border}` }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 14 }}>
                <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}>
                  <div style={{ width: 46, height: 46, background: p.color + '22', border: `1px solid ${p.color}44`, borderRadius: 12, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>{p.icon}</div>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: '#fff', fontFamily: 'Syne, sans-serif' }}>{p.name}</div>
                    <div style={{ fontSize: 11, color: C.textFaint }}>{p.type} integration</div>
                  </div>
                </div>
                <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                  <span style={{ padding: '4px 10px', borderRadius: 6, fontSize: 10, fontWeight: 700, background: si.color + '22', color: si.color, border: `1px solid ${si.color}44` }}>{p.status === 'connected' ? '●' : '○'} {si.label}</span>
                  <Btn variant={p.status === 'connected' ? 'danger' : 'success'} small onClick={() => toggle(p.id)}>{p.status === 'connected' ? 'Disconnect' : 'Reconnect'}</Btn>
                </div>
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 10, marginTop: 18 }}>
                {[['LAST SYNC', p.lastSync, C.text], ['ACTIVE LISTINGS', p.listed, p.color]].map(([lbl, val, color]) => (

                <div style={{ padding: '9px 12px', background: C.surfaceAlt, borderRadius: 8 }}>
                  <div style={{ fontSize: 9, color: C.textFaint, marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.07em' }}>PRICE MARKUP</div>
                  {editing === p.id ? (
                    <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                      <input type="number" value={editMarkup[p.id] ?? p.markup} onChange={e => setEditMarkup(prev => ({ ...prev, [p.id]: e.target.value }))} style={{ width: 55, padding: '3px 6px', background: C.bg, border: `1px solid ${C.primary}`, borderRadius: 5, color: '#fff', fontSize: 12, outline: 'none' }} />

                  ⚠ Bot session expired. Last error: Connection timeout at 13:27. Auto-retry in 5 minutes.
                </div>
              )}
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// ── ACTIVITY LOG ──────────────────────────────────────────────────
function ActivityLog({ logs: initLogs }) {
  const [typeF, setTypeF] = useState('all');
  const [platF, setPlatF] = useState('all');
  const [search, setSearch] = useState('');
  const [logs] = useState(initLogs);

  const plats = ['all', ...Array.from(new Set(logs.map(l => l.platform)))];
  const filtered = logs.filter(l => (typeF === 'all' || l.type === typeF) && (platF === 'all' || l.platform === platF) && (!search || l.action.toLowerCase().includes(search.toLowerCase())));
  const typeColors = { success: C.success, info: C.info, warning: C.warning, error: C.error };
  const typeIcons = { success: '✓', info: 'ℹ', warning: '⚠', error: '✕' };

  return (
    <div>
      <div style={{ marginBottom: 22 }}>
        <h2 style={{ fontSize: 20, fontWeight: 700, color: '#fff', fontFamily: 'Syne, sans-serif' }}>Activity Log</h2>
        <p style={{ color: C.textMuted, fontSize: 12 }}>All bot actions and system events</p>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 18 }}>
        {['success', 'info', 'warning', 'error'].map(t => {
          const count = logs.filter(l => l.type === t).length;
          const color = typeColors[t];
          return (
            <div key={t} onClick={() => setTypeF(typeF === t ? 'all' : t)} style={{ padding: '13px 15px', background: C.surface, border: `1px solid ${typeF === t ? color + '55' : C.border}`, borderRadius: 10, cursor: 'pointer', transition: 'all 0.15s' }}>
              <div style={{ fontSize: 10, color: C.textMuted, textTransform: 'uppercase', letterSpacing: '0.07em', marginBottom: 5 }}>{t}</div>
              <div style={{ fontSize: 22, fontWeight: 800, color, fontFamily: 'Syne, sans-serif' }}>{count}</div>
            </div>
          );
        })}
      </div>

      <div style={{ display: 'flex', gap: 10, marginBottom: 14, flexWrap: 'wrap' }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search logs..." style={{ padding: '8px 12px', background: C.surface, border: `1px solid ${C.borderAlt}`, borderRadius: 8, color: C.text, fontSize: 12, outline: 'none', width: 220 }} />
        {['all', 'success', 'info', 'warning', 'error'].map(t => {
          const c = typeColors[t] || '#6b7280';
          return <button key={t} onClick={() => setTypeF(t)} style={{ padding: '8px 12px', background: typeF === t ? c + '22' : 'transparent', border: `1px solid ${typeF === t ? c + '55' : C.borderAlt}`, borderRadius: 8, color: typeF === t ? c : C.textMuted, cursor: 'pointer', fontSize: 11, textTransform: 'capitalize' }}>{t}</button>;
        })}
        <select value={platF} onChange={e => setPlatF(e.target.value)} style={{ padding: '8px 12px', background: C.surface, border: `1px solid ${C.borderAlt}`, borderRadius: 8, color: C.text, fontSize: 11, outline: 'none', cursor: 'pointer' }}>
          {plats.map(p => <option key={p} value={p}>{p === 'all' ? 'All Platforms' : p}</option>)}
        </select>
      </div>

      <Card style={{ padding: 0, overflow: 'hidden' }}>
        <div style={{ padding: '10px 16px', background: C.surfaceAlt, borderBottom: `1px solid ${C.border}`, display: 'flex', gap: 16 }}>
          {['TIME', 'PLATFORM', 'ACTION', 'TYPE'].map(h => (
            <span key={h} style={{ fontSize: 10, color: C.textFaint, textTransform: 'uppercase', letterSpacing: '0.07em', ...(h === 'ACTION' ? { flex: 1 } : {}), ...(h === 'TIME' ? { width: 75 } : {}), ...(h === 'PLATFORM' ? { width: 90 } : {}), ...(h === 'TYPE' ? { width: 80 } : {}) }}>{h}</span>
          ))}
        </div>
        {filtered.map((log, i) => {
          const c = typeColors[log.type];
          return (
            <div key={log.id} style={{ padding: '11px 16px', borderBottom: i < filtered.length - 1 ? `1px solid rgba(30,30,46,0.5)` : 'none', display: 'flex', gap: 16, alignItems: 'center' }}>
              <span style={{ fontSize: 11, color: C.textFaint, fontFamily: 'monospace', width: 75, flexShrink: 0 }}>{log.time}</span>
              <span style={{ width: 90, flexShrink: 0, padding: '2px 6px', background: C.surfaceAlt, border: `1px solid ${C.border}`, borderRadius: 4, fontSize: 10, color: C.textMuted, textAlign: 'center' }}>{log.platform}</span>
              <span style={{ flex: 1, fontSize: 12, color: '#d1d5db' }}>{log.action}</span>
              <div style={{ width: 80, display: 'flex', justifyContent: 'flex-end' }}>
                <span style={{ padding: '2px 8px', borderRadius: 5, fontSize: 10, fontWeight: 700, background: c + '22', color: c, border: `1px solid ${c}44` }}>
                  {typeIcons[log.type]} {log.type}
                </span>
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && <div style={{ textAlign: 'center', padding: 40, color: C.textFaint, fontSize: 13 }}>No logs found</div>}
      </Card>
      <div style={{ marginTop: 10, fontSize: 11, color: C.textFaint, textAlign: 'right' }}>{filtered.length} entries</div>
    </div>
  );
}

  const [logs, setLogs] = useState(MOCK_LOGS);

  const nav = p => setPage(p);

  const handleAuth = () => { setLoggedIn(true); setPage('dashboard'); };
  const handleLogout = () => { setLoggedIn(false); setPage('landing'); };

  const addAccount = acc => {
    const newAcc = { ...acc, id: Date.now(), status: 'pending', views: 0, lastUpdated: 'just now', platforms: { gameboost: 'pending', g2g: 'pending', zeusx: 'pending', bst: 'pending' } };
    setAccounts(prev => [newAcc, ...prev]);
    const newLog = { id: Date.now(), time: new Date().toLocaleTimeString(), action: `New account queued for listing: ${acc.shortTitle || acc.title}`, type: 'info', platform: 'All' };
    setLogs(prev => [newLog, ...prev]);
    setPage('inventory');
  };

  const deleteAccount = id => setAccounts(prev => prev.filter(a => a.id !== id));
  const updateStatus = (id, status) => setAccounts(prev => prev.map(a => a.id === id ? { ...a, status } : a));

  // Public pages
  if (page === 'landing') return <Landing nav={nav} />;
  if (page === 'pricing') return <Pricing nav={nav} />;
  if (page === 'login') return <Auth mode="login" onAuth={handleAuth} nav={nav} />;
  if (page === 'register') return <Auth mode="register" onAuth={handleAuth} nav={nav} />;

  // Guard private pages
  if (!loggedIn) return <Auth mode="login" onAuth={handleAuth} nav={nav} />;

  const pageContent = {
    dashboard: <Dashboard accounts={accounts} nav={nav} />,
    inventory: <Inventory accounts={accounts} onDelete={deleteAccount} onStatusChange={updateStatus} nav={nav} />,
    'add-account': <AddAccount onSave={addAccount} nav={nav} />,
    connections: <Connections />,
    'activity-log': <ActivityLog logs={logs} />,
  };

  return (
    <AppLayout page={page} nav={nav} onLogout={handleLogout}>
      {pageContent[page] || <Dashboard accounts={accounts} nav={nav} />}
    </AppLayout>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
